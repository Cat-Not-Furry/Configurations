# ===================================================================
# CONFIGURACIÓN MEJORADA PARA HYPRLOCK (CON POSICIONES CORREGIDAS)
# ===================================================================

# --- Fondo de Pantalla ---
background {
    monitor =
    path = ~/.config/i3/fondos/girlinux.png # Recuerda cambiar esta ruta
    blur_passes = 3
    blur_size = 3
}

# --- Campo de Contraseña (se queda en el centro) ---
input-field {
    monitor =
    size = 250, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    inner_color = rgba(0, 0, 0, 0.5)
    outer_color = rgb(200, 200, 200)
    font_color = rgb(255, 255, 255)
    fade_on_empty = false
    placeholder_text = <i>Contraseña...</i>
    halign = center
    valign = down
    position = 0, 150
}

# --- Reloj (lo movemos cerca de la parte superior) ---
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%R")"
    font_size = 90
    font_family = Hack Nerd Font
    color = rgba(255, 255, 255, 0.9)
    halign = center
    valign = top # Alineado a la parte superior
    position = 0, -150 # 80 píxeles hacia abajo desde el borde superior
}

# --- Mensaje de "Bienvenido" (lo movemos arriba del campo de contraseña) ---
label {
    monitor =
    text = ¡Bienvenido de nuevo, $USER!
    font_size = 25
    font_family = Hack Nerd Font
    color = rgba(255, 255, 255, 0.8)
    halign = center
    valign = center
    position = 0, -150 # 80 píxeles hacia arriba desde el centro
}

# --- Mensaje de Error (lo movemos debajo del campo de contraseña) ---
label {
    monitor =
    text = $FAIL
    font_size = 20
    font_family = Hack Nerd Font
    color = rgba(255, 50, 50, 1.0) # Rojo
    halign = center
    valign = center
    position = 0, 80 # 80 píxeles hacia abajo desde el centro
}
