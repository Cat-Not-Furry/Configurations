# ===================================================================
# CONFIGURACIÓN DE HYPRIDLE
# ===================================================================
general {
    lock_cmd = pidof hyprlock || hyprlock          # Comando para bloquear (evita lanzar múltiples instancias)
    before_sleep_cmd = loginctl lock-session      # Bloquear la sesión antes de que el sistema se suspenda
    after_sleep_cmd = hyprctl dispatch dpms on    # Volver a encender el monitor al despertar
}

# --- REGLAS DE INACTIVIDAD ---

# Regla 1: Bloquear la pantalla después de 5 minutos de inactividad
listener {
    timeout = 300                                 # 300 segundos = 5 minutos
    on-timeout = loginctl lock-session            # Comando a ejecutar: bloquear la sesión
}

# Regla 2: Apagar la pantalla después de 10 minutos de inactividad
listener {
    timeout = 600                                 # 600 segundos = 10 minutos
    on-timeout = hyprctl dispatch dpms off        # Comando a ejecutar: apagar la pantalla (DPMS)
    on-resume = hyprctl dispatch dpms on          # Comando al reanudar: volver a encender la pantalla
}
