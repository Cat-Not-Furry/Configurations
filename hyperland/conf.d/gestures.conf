# ================================================================== #
#     GESTOS DEL TOUCHPAD (libinput-gestures + hyprland gestures)    #
# ================================================================== #

# Formato: gesture = dedos, dirección, acción, opciones

# Cambiar de workspace con cuatro dedos izquierda/derecha
gesture = 4, horizontal, workspace

# Cambiar foco de ventana con tres dedos (usando script auxiliar)
gesture = 3, right, dispatcher, exec, ~/.config/hypr/scripts/move_focus.sh r
gesture = 3, left, dispatcher, exec, ~/.config/hypr/scripts/move_focus.sh l
gesture = 3, up, dispatcher, exec, ~/.config/hypr/scripts/move_focus.sh u
gesture = 3, down, dispatcher, exec, ~/.config/hypr/scripts/move_focus.sh d

# Pantalla completa (cuatro dedos arriba) y flotante (cuatro dedos abajo)
gesture = 4, up, dispatcher, fullscreen
gesture = 4, down, dispatcher, togglefloating
