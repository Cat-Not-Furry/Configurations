# ================================================================== #
#                   ATAJOS DE TECLADO (keybindings)                  #
# ================================================================== #

binds {
    workspace_back_and_forth = false
}

# Lanzar aplicaciones
bind = $mainMod, T, exec, foot
bind = $mainMod SHIFT, T, exec, alacritty
bind = $mainMod SHIFT, Z, exec, rofi -modi drun,run -show drun -show-icons
bind = $mainMod, D, exec, wofi
bind = $mainMod SHIFT, S, exec, ~/.config/hypr/scripts/wofi-script.sh
bind = $mainMod SHIFT, A, exec, ~/.config/hypr/scripts/wofi-script1.sh
bind = $mainMod SHIFT, E, exit,
bind = $mainMod SHIFT, N, exec, hyprctl hyprsunset temperature 4000
bind = $mainMod SHIFT, D, exec, hyprctl hyprsunset identity

# Matar ventana
bind = $mainMod, C, killactive,
bind = $mainMod SHIFT, R, exec, hyprctl reload
bind = $mainMod ALT, B, exec, hyprlock
bind= $mainMod, X, exec, copyq toggle
bind= $mainMod SHIFT, X, exec, copyq &
bind= $mainMod, X, exec, copyq toggle
bind= $mainMod SHIFT, X, exec, copyq &


# Fondos de video con mpvpaper
bind = $mainMod, P, exec, killall mpvpaper; mpvpaper -p -o no-audio -o loop eDP-1  ~/Videos/Wallpapers/Posejojo.mp4 &
bind = $mainMod SHIFT, P, exec, killall mpvpaper; mpvpaper -p -o no-audio -o loop HDMI-A-2  ~/Videos/Wallpapers/Posejojo.mp4 &
bind = $mainMod, O, exec, killall mpvpaper; mpvpaper -p -o no-audio -o loop eDP-1  ~/Videos/Wallpapers/DVD_OS.mp4 &
bind = $mainMod SHIFT, O, exec, killall mpvpaper; mpvpaper -p -o no-audio -o loop HDMI-A-2  ~/Videos/Wallpapers/DVD_OS.mp4 &
bind = $mainMod, L, exec, killall mpvpaper &

# Movimiento de foco (vi-style y flechas)
bind = $mainMod, left, movefocus, l
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d
bind = $mainMod, right, movefocus, r

# Mover ventanas
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d
bind = $mainMod SHIFT, right, movewindow, r

# Layout: split horizontal / vertical
bind = $mainMod, H, layoutmsg, preselect l
bind = $mainMod, V, layoutmsg, preselect d

# Pantalla completa
bind = $mainMod, F, fullscreen

# Alternar tiling/floating
bind = $mainMod SHIFT, Space, togglefloating
bind = $mainMod, Space, cyclenext

# Multimedia (volumen)
binde = , XF86AudioRaiseVolume, exec, pamixer -i 2
binde = , XF86AudioLowerVolume, exec, pamixer -d 2
bind = , XF86AudioMute, exec, pamixer -t
bind = , XF86AudioMicMute, exec, pamixer --default-source -t

# Brillo
binde = , XF86MonBrightnessUp, exec, brightnessctl set +2%
binde = , XF86MonBrightnessDown, exec, brightnessctl set 2%-

# Captura de pantalla
bind = CONTROL, Print, exec, flameshot full -c
bind = , Print, exec, flameshot gui -c

# Redimensionar ventanas (modo resize)
bind = $mainMod, R, submap, resize

submap = resize
binde = , left, resizeactive, -20 0
binde = , right, resizeactive, 20 0
binde = , up, resizeactive, 0 -20
binde = , down, resizeactive, 0 20
bind = , escape, submap, reset
bind = , space, submap, reset
submap = reset

# Movimiento con ratón
bindm = SUPER, mouse:272, movewindow
bindm = SUPER, mouse:273, resizewindow
