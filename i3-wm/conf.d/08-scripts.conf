# Iniciar Polybar (commented, because we have bumblebee-status bar)
#exec_always --no-startup-id ~/.config/polybar/launch.sh

# Miselaneus
bindsym Control+Print exec flameshot full -c 
bindsym Print exec flameshot gui -c
bindsym $mod+Shift+t exec ~/.local/bin/toggle-keyboard.sh &
bindsym $mod+Shift+n exec ~/.config/eww/launch.sh &
bindsym $mod+x exec copyq toggle
bindsym $mod+Shift+x exec copyq &
bindsym $mod+mod1+t exec "i3bgwin urxvt -depth 32 -bg '[00]black' --color6 '[50]cyan' +sb -embed {windowid} -e cava &"
bindsym $mod+mod1+k exec "pkill i3bgwin && pkill urxvt && pkill picom"

