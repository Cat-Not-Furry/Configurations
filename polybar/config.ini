;==========================================================
;   POLYBAR CONFIG
;   Fuente: Hack Nerd Font
;==========================================================

[colors]
background = #161821
background-alt = #0045B0
foreground = #FFFFFF
primary = #84A0C6
secondary = #A093C7
alert = #E27878
disabled = #707880
warning = #fba922
critical = #ff5555

[bar/mybar]
width = 100%
height = 16pt
radius = 10
background = ${colors.background}
foreground = ${colors.foreground}
line-size = 2pt
border-size = 2pt
border-color = #84A0C6
padding-left = 1
padding-right = 1
module-margin = 1
separator = " "
separator-foreground = ${colors.disabled}
font-0 = "Hack:size=8;2"
font-1 = "Hack Nerd Font:size=10;3"
font-2 = "Font Awesome 6 Free:style=Solid:size=8;2"
font-3 = "Font Awesome 6 Brands:size=8;2"
modules-left = i3 xwindow
modules-center = cmus
modules-right = cpu-status temp-status memory filesystem pulseaudio kbdlight backlight battery hostname keyboard date systray
cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true
wm-restack = i3

[module/i3]
type = internal/i3
pin-workspaces = true
strip-wsnumbers = true
format = <label-state> <label-mode>
label-focused = %{F#FFFFFF}%{F-} ¾░«»  %name%
label-focused-background = ${colors.background}
label-focused-underline = ${colors.primary}
label-focused-padding = 1
label-unfocused = ¾░ŖĀ %name%
label-unfocused-padding = 1
label-urgent = ’ü▒  %name%
label-urgent-padding = 1

[module/systray]
type = internal/tray
format-margin = 7pt
tray-spacing = 3pt

[module/xwindow]
type = internal/xwindow
label = ’é░ %title:0:20:...% ’äå

[module/cpu-status]
type = custom/script
exec = ~/.config/polybar/scripts/cpu_status.sh
interval = 2
click-left = alacritty -e bash -c "htop"

[module/temp-status]
type = custom/script
exec = ~/.config/polybar/scripts/temp_status.sh
interval = 3

[module/memory]
type = internal/memory
interval = 3
format-prefix = "Ņ┐ģ "
format-prefix-foreground = ${colors.primary}
label = %gb_used%/%gb_total% (%percentage_used%%)

[module/filesystem]
type = internal/fs
interval = 120
mount-0 = /
format-mounted-prefix = "’éĀ "
format-mounted-prefix-foreground = ${colors.primary}
label-mounted = %used%/%total% (%percentage_used%%)

[module/battery]
type = internal/battery
full-at = 99
battery = BAT0
adapter = AC
poll-interval = 10
low-at = 20
format-charging = <animation-charging> <label-charging>
format-discharging = <ramp-capacity> <label-discharging>
format-low = <animation-low> <label-low>
format-full-prefix = "’ēĆ "
format-full-prefix-foreground = ${colors.primary}
label-charging = %percentage%%
label-discharging = %percentage%%
label-full = Cargada
label-low = %percentage%%
label-low-foreground = ${colors.critical}
ramp-capacity-0 = ’ēä
ramp-capacity-1 = ’ēā
ramp-capacity-2 = ’ēé
ramp-capacity-3 = ’ēü
ramp-capacity-4 = ’ēĆ
ramp-capacity-foreground = ${colors.foreground}
animation-charging-0 = ’ēä
animation-charging-1 = ’ēā
animation-charging-2 = ’ēé
animation-charging-3 = ’ēü
animation-charging-4 = ’ēĆ
animation-charging-foreground = ${colors.foreground}
animation-charging-framerate = 750
animation-low-0 = ’ēä
animation-low-1 = " "
animation-low-framerate = 400
animation-low-foreground = ${colors.critical}

[module/cmus]
type = custom/script
exec = ~/.config/polybar/scripts/cmus_status.sh
interval = 2
format-prefix = "’Ćü "
format-prefix-foreground = ${colors.secondary}
format = <label>
label = %{A2:cmus-remote --pause:}%{A3:cmus-remote --next:}%{A1:cmus-remote --prev:}%output%%{A2}%{A3}%{A1}

[module/pulseaudio]
type = internal/pulseaudio
format-volume = <ramp-volume> <label-volume>
label-volume = %percentage%%
label-muted = ’æ”
ramp-volume-0 = ’Ć”
ramp-volume-1 = ’Ć¦
ramp-volume-2 = ’Ć©
click-left = pavucontrol

[module/backlight]
type = internal/backlight
card = intel_backlight
format = <ramp> <label>
label = %percentage%%
ramp-0 = ¾░ā×
ramp-1 = ¾░ā¤
ramp-2 = ¾░āĀ

[module/kbdlight]
type = custom/script
exec = ~/.config/polybar/scripts/kbdlight.sh
interval = 10
tail = true

[module/hostname]
type = custom/script
exec = cat /etc/hostname
interval = 3600
format-prefix = "’Ćć "
format-prefix-foreground = ${colors.primary}

[module/date]
type = custom/script
exec = ~/.config/polybar/scripts/polybar_date_icon.sh
interval = 1
tail = false
click-left = alacritty -e bash -c "cal -y; read"
format-prefix = "’ü│ "
format-prefix-foreground = ${colors.primary}

[module/keyboard]
type = custom/script
exec = ~/.config/polybar/scripts/keyboard.sh
interval = 1
click-left = ~/.local/bin/toggle-keyboard.sh
